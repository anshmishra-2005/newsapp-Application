<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="Fragments/header :: myHeader">
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--    <link rel="stylesheet" th:href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">-->



</head>
<body>

<nav>
    <div class="main-nav container flex">
        <a th:href="@{/home}" onclick="reload()" class="company-logo">
            <h1>3ANews</h1>
        </a>
        <div class="buttons">
            <a th:href="@{/login}"><button type="button" class="btn btn-outline-primary">Log In</button></a>
            <a th:href="@{/signup}"><button type="button" class="btn btn-primary">Sign up</button></a>

        </div>

    </div>
</nav>

<div class="form-div" style="display: flex;flex-direction: column">
    <h1 align="center">Login Here! </h1>
    <form th:action="@{/login}" method="post">
        <div class="user">
            <label for="Email"></label>
            <input
                    type="text"
                    id="email"
                    name="email"
                    placeholder="Email"
            />
        </div>

        <div class="pass">
            <label for="password"></label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="password"
            />
        </div>

        <input class="btn btn-primary buttons" type="submit" value="Submit" >
    </form>

    <p align="center" style="margin-top: 20px;">Not a member <a th:href="@{/signup}">Sign up Now</a></p>

    <div style="margin: 20px; font-size: 20px; text-align: center"  th:if="${error}" th:text="${error}"></div>
</div>



<footer th:replace="Fragments/footer :: myFooter"></footer>
</body>
</html>
