<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="Fragments/header :: myHeader">
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--    <link rel="stylesheet" th:href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">-->
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-text-color: #1b3b56;
            --secondary-text-color: #577592;
            --accent-color: #2294cd;
            --accent-color-dark: #1d69a3;
            --padding-inline-section: 28px;
        }

        body {
            position: relative;
            font-family: "Poppins", sans-serif;
            color: var(--primary-text-color);
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 50%, #ff0844 100%);
            min-height: 100vh;
            min-width: 100vw;
            animation-name: bodyColorChanger;
            animation-duration: 8s;
            animation-iteration-count: infinite;
            animation-timing-function: ease;
        }

        @keyframes bodyColorChanger {
            0% {
                background: linear-gradient(135deg, #ff0844 0%, #ffb199 50%, #ff0844 100%);
            }
            25% {
                background: linear-gradient(135deg, #0093e9 0%, #80d0c7 50%, #fcee21 100%);
            }
            50% {
                background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            }
            75% {
                background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            }
            100% {
                background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            }
        }

        p {
            font-family: "Roboto", sans-serif;
            color: var(--secondary-text-color);
            line-height: 1.4rem;
        }

        a {
            text-decoration: none;
        }

        ul {
            list-style: none;
        }
        .flex {
            display: flex;
            align-items: center;
        }
        .container {
            max-width: 1100px;
            margin-inline: auto;
            overflow: hidden;
        }

        nav {
            background-color: #f3faff;
            box-shadow: 0 0 4px #bbd0e2;
            position: fixed;
            top: 0;
            z-index: 99;
            left: 0;
            right: 0;
        }

        .main-nav {
            justify-content: space-between;
            padding: 8px;
            align-items: center;
        }

        .company-logo h1 {
            padding-block: 12px;
            width: 120px;
            height: 70px;
        }

        .nav-links ul {
            gap: 22px;
        }

        .hover-links {
            cursor: pointer;
        }

        .hover-links:hover {
            color: var(--secondary-text-color);
        }

        .hover-links:active {
            color: red;
        }

        .nav-item.active {
            color: (var(--accent-color));
        }

        .search-bar {
            height: 32px;
            gap: 8px;
        }
        .news-input {
            width: 200px;
            height: 100%;
            padding-inline: 12px;
            border-radius: 4px;
            border: 2px solid #bbd0e2;
            font-family: "Roboto", sans-serif;
        }

        .search-button {
            background-color: var(--accent-color);
            color: white;
            padding: 8px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: "Roboto", sans-serif;
        }

        .search-button:hover {
            background-color: var(--accent-color-dark);
        }

        .home-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 99;
            text-align: center;
        }

        @media screen and (max-width:900px) {
            .buttons {
                display: none;
            }
            .main-nav {
                justify-content: center;
                align-items: center;
            }
        }

    </style>


</head>
<body>
<nav>
    <div class="main-nav container flex">
        <a th:href="@{/home}" onclick=" reload()" class="company-logo">
            <h1>3ANews</h1>
        </a>
        <div class="buttons">
            <a th:href="@{/login}"><button type="button" class="btn btn-outline-primary">Log In</button></a>
            <a th:href="@{/signup}"><button type="button" class="btn btn-primary">Sign up</button></a>

        </div>

    </div>
</nav>

<div class="home-text">
    <h1>WelCome to our News app</h1>
    <p>Start Your Day with global Knowledge</p>
    <a href=""><button type="button" class="btn btn-outline-primary">Log In</button></a>
    <a href=""><button type="button" class="btn btn-primary">Sign up</button></a>
</div>

<footer th:replace="Fragments/footer :: myFooter"></footer>
</body>
</html>
