<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="Fragments/header :: myHeader">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
            integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
            crossorigin="anonymous"
    />

    <link rel="stylesheet" href="./signup.css" />
</head>
<body>

<nav>
    <div class="main-nav container flex">
        <a href="@{/home}" onclick="reload()" class="company-logo">
            <h1>3ANews</h1>
        </a>
        <div class="buttons">
            <a href="@{/login}"><button type="button" class="btn btn-outline-primary">Log In</button></a>
            <a href="@{/signup}"><button type="button" class="btn btn-primary">Sign up</button></a>

        </div>

    </div>
</nav>

<div class="form-div">
    <h1 align="center">Sign Up? </h1>
    <form th:action="@{/login}" method="post">
        <div class="user">
            <label for="username"></label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Username"
            />
        </div>

        <div class="email">
            <label for="email"></label>
            <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="email"
            />
        </div>


        <div class="pass">
            <label for="password"></label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="password"
            />
        </div>

        <input class="btn btn-primary buttons" type="submit" value="Submit" />
    </form>

    <p align="center" style="margin-top: 20px;">You are a member then , <a href="./login.html">Log In</a></p>

</div>

<footer th:replace="Fragments/footer :: myFooter"></footer>

</body>
</html>
